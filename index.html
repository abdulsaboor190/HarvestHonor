<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile-first viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta
      name="description"
      content="HarvestHonor — AI-powered crop price comparison tool for farmers in Pakistan. Know your fair market price before you sell."
    />

    <title>HarvestHonor</title>

    <!-- Application stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <!--
      html2canvas CDN
      Used in Phase 4 to capture the Proof Card as a shareable image.
      Docs: https://html2canvas.hertzen.com/
    -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
      defer
    ></script>

    <!-- Application scripts (defer keeps render unblocked) -->
    <script src="config.js" defer></script>
    <script src="api.js" defer></script>
    <script src="app.js" defer></script>
  </head>

  <body>
    <!--
      #app — Single mount point.
      All four screens (Input, Result, Proof Card, Share) are rendered
      inside this div by JavaScript. Nothing else lives in <body>.
    -->
    <div id="app"></div>
  </body>
</html>
